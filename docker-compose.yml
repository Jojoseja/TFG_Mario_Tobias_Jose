services:
  backend:
    build:
      context: ./backend
    container_name: t2f-backend
    ports:
      - "${BACKEND_PORT}:8080"
    env_file:
      - ./backend/.env
    environment:
      LOGGING_FILE_NAME: ${LOGGING_FILE_NAME:-/app/logs/time2focus.log}
    volumes:
      - ${BACKEND_LOGS_DIR:-./logs/backend}:/app/logs
    depends_on:
      - db

  db:
    image: postgres:17
    container_name: t2f-db
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
