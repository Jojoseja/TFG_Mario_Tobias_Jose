services:  
  frontend:
    build:
      context: ./frontend
    container_name: t2f-frontend
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm run dev -- --host 0.0.0.0 --port ${FRONTEND_PORT}"
  
  backend:
    build:
      context: ./backend
    container_name: t2f-backend
    ports:
      - "${BACKEND_PORT}:${SERVER_PORT}"
    env_file:
      - .env
    environment:
      LOGGING_FILE_NAME: ${LOGGING_FILE_NAME:-/app/logs/time2focus.log}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
    volumes:
      - ${BACKEND_LOGS_DIR:-./logs/backend}:/app/logs
    depends_on:
      - db

  db:
    image: postgres:17
    container_name: t2f-db
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
